# Local stack: the API + an Ollama daemon for the open-source provider.
# `docker compose up` then (one-time) pull the model:
#   docker compose exec ollama ollama pull llama3.1:8b
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: llama3.1:8b
    depends_on:
      - ollama
    volumes:
      - ./chroma_db:/app/chroma_db

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  ollama_models:
