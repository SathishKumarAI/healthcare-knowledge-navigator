name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check app tests
      - name: Format check
        run: ruff format --check app tests
      - name: Type check
        run: mypy app
      - name: Tests (offline, fake provider)
        run: pytest

  docker:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t healthcare-knowledge-navigator:ci .
